name: CD Develop

on:
  push:
    branches: [develop]

concurrency:
  group: cd-develop
  cancel-in-progress: true

jobs:
  deploy-development:
    name: Deploy to Development
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Deploy OTA update
        run: eas update --channel development --environment development --message "develop@${{ github.sha }}" --non-interactive
