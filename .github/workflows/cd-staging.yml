name: CD Staging

on:
  push:
    branches: ["release/*"]

concurrency:
  group: cd-staging-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Deploy OTA update
        run: eas update --channel staging --environment staging --message "staging@${{ github.ref_name }}" --non-interactive

      - name: Trigger staging build
        run: eas build --profile staging --platform all --non-interactive --no-wait
