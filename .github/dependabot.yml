version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      expo:
        patterns:
          - "expo*"
          - "@expo/*"
          - "react-native*"
          - "@react-native*"
      typescript:
        patterns:
          - "typescript"
          - "@typescript-eslint/*"
          - "@types/*"
    ignore:
      # Expo packages must be upgraded with 'npx expo install --fix', not Dependabot
      - dependency-name: "expo*"
      - dependency-name: "@expo/*"
      - dependency-name: "react-native*"
      - dependency-name: "@react-native*"
      # ESLint major versions require flat config migration — upgrade manually
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
    open-pull-requests-limit: 10

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
